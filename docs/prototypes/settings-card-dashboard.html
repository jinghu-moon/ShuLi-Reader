<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>设置面板 - 卡片仪表盘</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,400,0,0">
    <style>
        :root {
            --reader-paper: #f4efe6;
            --sheet: #fbfaf6;
            --surface: #fffdf8;
            --surface-container: #f2efe7;
            --surface-variant: #ebe5d8;
            --primary: #617447;
            --primary-container: #e4efd7;
            --on-primary-container: #263318;
            --secondary: #466a72;
            --secondary-container: #dbecef;
            --text-primary: #332c24;
            --text-secondary: #6f6252;
            --text-tertiary: #9a8d7a;
            --outline: rgba(111, 98, 82, 0.14);
            --shadow: rgba(51, 44, 36, 0.12);
            --danger: #9d5a50;
            --warm: #d9954b;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #161923;
            color: var(--text-primary);
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        }

        button {
            border: 0;
            font: inherit;
            color: inherit;
            background: transparent;
        }

        .material-symbols-rounded {
            font-family: "Material Symbols Rounded";
            font-weight: normal;
            font-style: normal;
            font-size: 18px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-flex;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: "liga";
            -webkit-font-smoothing: antialiased;
            font-feature-settings: "liga";
        }

        .phone-frame {
            position: relative;
            width: 375px;
            height: 812px;
            overflow: hidden;
            border-radius: 40px;
            background: var(--reader-paper);
            box-shadow: 0 22px 70px rgba(0, 0, 0, 0.34);
        }

        .reader-content {
            width: 100%;
            height: 100%;
            overflow: hidden;
            padding: 58px 24px;
            background:
                radial-gradient(circle at 24% 18%, rgba(228, 239, 215, 0.58), transparent 30%),
                linear-gradient(180deg, #f8f1e5 0%, #efe7d8 100%);
            color: #3d3229;
            font-size: 16px;
            line-height: 1.82;
        }

        .reader-content p {
            margin-bottom: 12px;
            text-indent: 2em;
            opacity: 0.34;
        }

        .bottom-sheet {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            max-height: 75%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border-radius: 18px 18px 0 0;
            background: var(--sheet);
            box-shadow: 0 -8px 28px rgba(35, 30, 24, 0.16);
        }

        .drag-handle {
            width: 36px;
            height: 4px;
            margin: 8px auto 4px;
            border-radius: 99px;
            background: #c8beb0;
        }

        .peek-area {
            padding: 8px 16px 12px;
            border-bottom: 1px solid var(--outline);
        }

        .peek-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 12px;
        }

        .scope-toggle {
            display: inline-flex;
            padding: 2px;
            border-radius: 10px;
            background: rgba(111, 98, 82, 0.1);
        }

        .scope-btn {
            min-width: 42px;
            padding: 5px 10px;
            border-radius: 8px;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
        }

        .scope-btn.active {
            background: var(--surface);
            color: var(--text-primary);
            font-weight: 600;
            box-shadow: 0 1px 4px rgba(51, 44, 36, 0.12);
        }

        .theme-row {
            display: flex;
            justify-content: center;
            gap: 8px;
        }

        .theme-circle {
            width: 22px;
            height: 22px;
            border: 2px solid transparent;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: inset 0 0 0 1px rgba(51, 44, 36, 0.08);
        }

        .theme-circle.active {
            border-color: var(--primary);
        }

        .theme-circle:nth-child(1) { background: #f4efe6; }
        .theme-circle:nth-child(2) { background: #eaf2e5; }
        .theme-circle:nth-child(3) { background: #e4edf4; }
        .theme-circle:nth-child(4) { background: #2e302d; }
        .theme-circle:nth-child(5) { background: #f1e3d3; }

        .quick-actions {
            display: flex;
            gap: 6px;
        }

        .quick-action-btn {
            width: 30px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(70, 106, 114, 0.1);
            color: var(--secondary);
            cursor: pointer;
        }

        .tab-row {
            display: flex;
            padding: 0 16px;
            border-bottom: 1px solid var(--outline);
        }

        .tab-item {
            position: relative;
            flex: 1;
            padding: 11px 0;
            color: var(--text-secondary);
            font-size: 14px;
            text-align: center;
            cursor: pointer;
        }

        .tab-item.active {
            color: var(--text-primary);
            font-weight: 700;
        }

        .tab-item.active::after {
            content: "";
            position: absolute;
            left: 22%;
            right: 22%;
            bottom: 0;
            height: 3px;
            border-radius: 99px 99px 0 0;
            background: var(--primary);
        }

        .tab-content {
            display: none;
            flex: 1;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            padding: 12px 16px 18px;
            overflow-y: auto;
        }

        .tab-content.active {
            display: grid;
        }

        .setting-card {
            position: relative;
            min-height: 126px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden;
            padding: 14px;
            border: 1px solid rgba(111, 98, 82, 0.1);
            border-radius: 16px;
            background: var(--surface-container);
            text-align: left;
            cursor: pointer;
            transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease;
        }

        .setting-card.full-width {
            grid-column: 1 / -1;
            min-height: 122px;
        }

        .setting-card:hover {
            background: var(--surface);
            box-shadow: 0 6px 18px rgba(51, 44, 36, 0.1);
            transform: translateY(-1px);
        }

        .setting-card:active {
            transform: scale(0.98);
        }

        .setting-card:focus-visible,
        .scope-btn:focus-visible,
        .quick-action-btn:focus-visible,
        .tab-item:focus-visible,
        .back-btn:focus-visible,
        .reset-btn:focus-visible {
            outline: 2px solid var(--secondary);
            outline-offset: 2px;
        }

        .chevron {
            position: absolute;
            top: 14px;
            right: 12px;
            color: var(--text-tertiary);
            font-size: 16px;
        }

        .card-title {
            display: flex;
            align-items: center;
            gap: 6px;
            min-height: 18px;
            padding-right: 18px;
            color: var(--text-tertiary);
            font-size: 12px;
            font-weight: 600;
        }

        .title-strong {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 700;
        }

        .card-meta {
            color: var(--text-secondary);
            font-size: 11px;
            line-height: 1.35;
            white-space: nowrap;
        }

        .font-card {
            min-height: 94px;
            display: grid;
            grid-template-columns: 44px 1fr;
            align-items: center;
            column-gap: 10px;
        }

        .font-sample {
            color: var(--text-primary);
            font-family: "STSong", "Songti SC", "PingFang SC", serif;
            font-size: 34px;
            font-weight: 300;
            line-height: 1;
        }

        .font-name {
            color: var(--text-primary);
            font-size: 14px;
            font-weight: 700;
        }

        .font-weight {
            margin-top: 4px;
            color: var(--text-tertiary);
            font-size: 11px;
        }

        .line-preview {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 13px 0 12px;
        }

        .line-preview span {
            height: 3px;
            border-radius: 99px;
            background: rgba(154, 141, 122, 0.32);
        }

        .line-preview span:nth-child(1) { width: 96%; }
        .line-preview span:nth-child(2) { width: 88%; }
        .line-preview span:nth-child(3) { width: 62%; }

        .chip-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 18px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            min-height: 28px;
            padding: 5px 9px;
            border-radius: 8px;
            background: var(--primary-container);
            color: var(--on-primary-container);
            font-size: 12px;
            font-weight: 600;
        }

        .margin-visual {
            position: relative;
            width: 116px;
            height: 66px;
            margin: 10px auto 8px;
            border: 2px solid rgba(70, 106, 114, 0.38);
            border-radius: 8px;
            background: rgba(255, 253, 248, 0.62);
        }

        .margin-visual .content-box {
            position: absolute;
            left: 20px;
            right: 20px;
            top: 13px;
            bottom: 12px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            justify-content: center;
            padding: 7px;
            border: 1px solid rgba(97, 116, 71, 0.35);
            border-radius: 6px;
            background: rgba(228, 239, 215, 0.7);
        }

        .margin-visual .content-box span,
        .reading-page span,
        .title-lines span {
            height: 3px;
            border-radius: 99px;
            background: rgba(97, 116, 71, 0.44);
        }

        .title-preview {
            display: flex;
            min-height: 70px;
            flex-direction: column;
            justify-content: center;
            margin-top: 6px;
        }

        .title-text {
            margin-bottom: 9px;
            color: var(--text-primary);
            font-size: 17px;
            font-weight: 750;
            text-align: center;
        }

        .title-lines {
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding: 0 8px;
        }

        .title-lines span:nth-child(1) { width: 92%; }
        .title-lines span:nth-child(2) { width: 66%; }

        .slot-map {
            margin-top: 14px;
        }

        .slot-row {
            display: grid;
            grid-template-columns: 34px repeat(3, 1fr);
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .slot-label {
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 700;
        }

        .slot {
            min-height: 26px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            background: rgba(70, 106, 114, 0.1);
            color: var(--secondary);
            font-size: 12px;
            font-weight: 650;
        }

        .slot.empty {
            border: 1px dashed rgba(154, 141, 122, 0.5);
            background: transparent;
            color: var(--text-tertiary);
        }

        .slot-divider {
            height: 1px;
            margin: 0 0 10px 42px;
            background: rgba(111, 98, 82, 0.15);
        }

        .preset-badge {
            width: 104px;
            min-height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 22px auto 10px;
            border-radius: 12px;
            background: var(--primary-container);
            color: var(--on-primary-container);
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0;
            box-shadow: inset 0 0 0 1px rgba(97, 116, 71, 0.18);
        }

        .method-list,
        .state-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 18px;
        }

        .method-item,
        .state-item {
            display: grid;
            grid-template-columns: 20px 1fr auto;
            align-items: center;
            gap: 7px;
            color: var(--text-primary);
            font-size: 12px;
            font-weight: 650;
        }

        .method-item .material-symbols-rounded,
        .state-item .material-symbols-rounded {
            color: var(--secondary);
            font-size: 18px;
        }

        .method-value {
            color: var(--text-secondary);
            font-size: 11px;
            font-weight: 600;
        }

        .state-item.off {
            color: var(--text-tertiary);
        }

        .state-mark {
            color: var(--primary);
            font-size: 13px;
            font-weight: 900;
        }

        .state-item.off .state-mark,
        .state-item.off .material-symbols-rounded {
            color: var(--text-tertiary);
        }

        .touch-phone {
            display: grid;
            grid-template-columns: 30% 1fr 30%;
            width: 116px;
            height: 72px;
            margin: 10px auto 8px;
            overflow: hidden;
            border: 2px solid rgba(70, 106, 114, 0.38);
            border-radius: 10px;
            background: rgba(255, 253, 248, 0.78);
        }

        .touch-zone {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            border-right: 1px solid rgba(70, 106, 114, 0.22);
            color: var(--secondary);
            font-size: 12px;
            font-weight: 750;
        }

        .touch-zone:last-child {
            border-right: 0;
        }

        .touch-zone.edge {
            background: var(--secondary-container);
        }

        .touch-zone.center {
            color: var(--text-secondary);
            font-size: 11px;
        }

        .animation-summary {
            display: grid;
            grid-template-columns: 44px 1fr;
            align-items: center;
            gap: 12px;
            margin-top: 15px;
        }

        .animation-icon {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 14px;
            background: var(--secondary-container);
            color: var(--secondary);
        }

        .animation-icon .material-symbols-rounded {
            font-size: 28px;
        }

        .animation-name {
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 750;
        }

        .speed-row {
            display: grid;
            grid-template-columns: auto 1fr auto;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 650;
        }

        .speed-track {
            height: 8px;
            overflow: hidden;
            border-radius: 99px;
            background: rgba(154, 141, 122, 0.22);
        }

        .speed-fill {
            display: block;
            width: 66%;
            height: 100%;
            border-radius: inherit;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
        }

        .eye-visual {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin: 12px 0;
        }

        .eye-ring {
            width: 58px;
            height: 58px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background:
                radial-gradient(circle, var(--surface-container) 0 54%, transparent 55%),
                conic-gradient(from -90deg, var(--warm) 0 40%, rgba(217, 149, 75, 0.14) 40% 100%);
            color: var(--text-primary);
            font-size: 13px;
            font-weight: 800;
        }

        .reminder {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            color: var(--text-secondary);
            font-size: 12px;
            font-weight: 650;
        }

        .reminder .material-symbols-rounded {
            color: var(--warm);
            font-size: 16px;
        }

        .reading-form {
            display: grid;
            grid-template-columns: 128px 1fr;
            align-items: center;
            gap: 16px;
            margin-top: 14px;
        }

        .page-preview {
            display: flex;
            gap: 8px;
            align-items: center;
            justify-content: center;
        }

        .reading-page {
            width: 54px;
            height: 72px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 7px;
            padding: 10px 8px;
            border: 1px solid rgba(111, 98, 82, 0.2);
            border-radius: 8px;
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent),
                #ead7ad;
            box-shadow: 0 3px 8px rgba(51, 44, 36, 0.08);
        }

        .reading-page:nth-child(2) {
            background:
                linear-gradient(135deg, rgba(255, 255, 255, 0.2), transparent),
                #e4cfa0;
        }

        .reading-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            color: var(--text-secondary);
            font-size: 13px;
            font-weight: 650;
        }

        .reading-meta strong {
            color: var(--text-primary);
            font-weight: 800;
        }

        .fullscreen-detail {
            position: absolute;
            inset: 0;
            z-index: 100;
            display: flex;
            flex-direction: column;
            background: var(--sheet);
            transform: translateX(100%);
            transition: transform 0.28s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .fullscreen-detail.show {
            transform: translateX(0);
        }

        .detail-header {
            display: grid;
            grid-template-columns: 40px 1fr auto;
            align-items: center;
            gap: 8px;
            padding: 48px 16px 12px;
            border-bottom: 1px solid var(--outline);
        }

        .back-btn,
        .reset-btn {
            height: 36px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            color: var(--text-primary);
            cursor: pointer;
        }

        .back-btn {
            width: 36px;
        }

        .reset-btn {
            padding: 0 10px;
            color: var(--primary);
            font-size: 13px;
            font-weight: 700;
        }

        .detail-title {
            color: var(--text-primary);
            font-size: 17px;
            font-weight: 800;
        }

        .detail-content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        .detail-section {
            margin-bottom: 22px;
        }

        .detail-section-title {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 2px 0 8px;
            color: var(--text-tertiary);
            font-size: 12px;
            font-weight: 800;
        }

        .detail-section-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--outline);
        }

        .detail-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            min-height: 46px;
            border-bottom: 1px solid rgba(111, 98, 82, 0.08);
        }

        .detail-item-label {
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 550;
        }

        .detail-item-value {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 650;
        }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="reader-content">
            <p>天色渐暗，远山如黛，一抹残阳映照在古城墙上，将斑驳的砖石染成暖橘色。</p>
            <p>林清站在城楼上，看着远处的官道。三天前那封密信让他夜不能寐。</p>
            <p>西风卷起枯叶，打着旋儿落在脚边。他紧了紧衣领，目光如炬。</p>
            <p>身后传来脚步声，轻而急促。“大人，京城来人了。”</p>
        </div>

        <div class="bottom-sheet">
            <div class="drag-handle"></div>

            <div class="peek-area">
                <div class="peek-row">
                    <div class="scope-toggle" aria-label="设置范围">
                        <button class="scope-btn active" type="button">全局</button>
                        <button class="scope-btn" type="button">本书</button>
                    </div>
                    <div class="theme-row" aria-label="主题">
                        <button class="theme-circle active" type="button" aria-label="纸张主题"></button>
                        <button class="theme-circle" type="button" aria-label="护眼主题"></button>
                        <button class="theme-circle" type="button" aria-label="蓝灰主题"></button>
                        <button class="theme-circle" type="button" aria-label="夜间主题"></button>
                        <button class="theme-circle" type="button" aria-label="暖色主题"></button>
                    </div>
                    <div class="quick-actions">
                        <button class="quick-action-btn" type="button" aria-label="亮度">
                            <span class="material-symbols-rounded">light_mode</span>
                        </button>
                        <button class="quick-action-btn" type="button" aria-label="锁定">
                            <span class="material-symbols-rounded">lock</span>
                        </button>
                    </div>
                </div>
            </div>

            <div class="tab-row" role="tablist" aria-label="设置分类">
                <button class="tab-item active" type="button" data-tab="typesetting" role="tab">排版</button>
                <button class="tab-item" type="button" data-tab="layout" role="tab">布局</button>
                <button class="tab-item" type="button" data-tab="pageturn" role="tab">翻页</button>
                <button class="tab-item" type="button" data-tab="auxiliary" role="tab">辅助</button>
            </div>

            <div class="tab-content active" id="tab-typesetting" role="tabpanel">
                <button class="setting-card font-card" type="button" onclick="openDetail('字体')">
                    <span class="material-symbols-rounded chevron">chevron_right</span>
                    <div class="font-sample">永</div>
                    <div>
                        <div class="font-name">鸿蒙黑体</div>
                        <div class="font-weight">Light</div>
                    </div>
                </button>

                <button class="setting-card" type="button" onclick="openDetail('正文排版')">
                    <span class="material-symbols-rounded chevron">chevron_right</span>
                    <div class="card-title">正文排版</div>
                    <div class="line-preview" aria-hidden="true">
                        <span></span>
                        <span></span>
                        <span></span>
                    </div>
                    <div class="card-meta">28sp · 行1.5 · 段12</div>
                </button>

                <button class="setting-card full-width" type="button" onclick="openDetail('文本处理')">
                    <span class="material-symbols-rounded chevron">chevron_right</span>

                document.querySelectorAll(".tab-item").forEach(item => item.classList.remove("active"));

                tab.classList.add("active");
                document.getElementById("tab-" + tab.dataset.tab).classList.add("active");
            });
        });

        document.querySelectorAll(".scope-btn").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll(".scope-btn").forEach(item => item.classList.remove("active"));
                btn.classList.add("active");
            });
        });

        document.querySelectorAll(".theme-circle").forEach(circle => {
            circle.addEventListener("click", () => {
                document.querySelectorAll(".theme-circle").forEach(item => item.classList.remove("active"));
                circle.classList.add("active");
            });
        });

        function openDetail(title) {
            const page = document.getElementById("detailPage");
            const titleEl = document.getElementById("detailTitle");
            const contentEl = document.getElementById("detailContent");
            const sections = detailData[title] || [];

            titleEl.textContent = title;
            contentEl.innerHTML = sections.map(section => `
                <section class="detail-section">
                    <div class="detail-section-title">${section.section}</div>
                    ${section.items.map(item => `
                        <div class="detail-item">
                            <span class="detail-item-label">${item.label}</span>
                            <span class="detail-item-value">${item.value}</span>
                        </div>
                    `).join("")}
                </section>
            `).join("");
            page.classList.add("show");
        }

        function closeDetail() {
            document.getElementById("detailPage").classList.remove("show");
        }
